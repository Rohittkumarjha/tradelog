name: Build & Deploy TradeLog

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Show repo contents (debug)
        run: |
          echo "Files in repo root:"
          ls -la
          echo ""
          echo "HTML files found:"
          find . -name "*.html" -not -path "./.git/*"

      - name: Inject API keys from GitHub Secrets
        run: |
          # Find the HTML file automatically
          HTML_FILE=$(find . -maxdepth 2 -name "*.html" -not -path "./.git/*" | head -1)
          if [ -z "$HTML_FILE" ]; then
            echo "ERROR: No HTML file found in repo!"
            exit 1
          fi
          echo "Found HTML file: $HTML_FILE"
          sed -i "s|YOUR_GOOGLE_CLIENT_ID_HERE|${{ secrets.GOOGLE_CLIENT_ID }}|g" "$HTML_FILE"
          sed -i "s|YOUR_ANTHROPIC_API_KEY_HERE|${{ secrets.ANTHROPIC_API_KEY }}|g" "$HTML_FILE"
          echo "✓ Keys injected into $HTML_FILE"
          # Save filename for next step
          echo "HTML_FILE=$HTML_FILE" >> $GITHUB_ENV

      - name: Create deploy folder
        run: |
          mkdir -p _site
          cp "$HTML_FILE" _site/index.html
          echo "✓ Copied to _site/index.html"

      - name: Verify keys were injected
        run: |
          if grep -q "YOUR_GOOGLE_CLIENT_ID_HERE" _site/index.html; then
            echo "⚠ WARNING: GOOGLE_CLIENT_ID not injected — check your secret name is exactly: GOOGLE_CLIENT_ID"
          else
            echo "✓ Google Client ID injected successfully"
          fi
          if grep -q "YOUR_ANTHROPIC_API_KEY_HERE" _site/index.html; then
            echo "⚠ WARNING: ANTHROPIC_API_KEY not injected — check your secret name is exactly: ANTHROPIC_API_KEY"
          else
            echo "✓ Anthropic API key injected successfully"
          fi

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v4

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

